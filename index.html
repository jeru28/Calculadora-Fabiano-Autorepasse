
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabiano Auto Repasse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --bg-dark: #0a0d12;
            --bg-panel: rgba(255, 255, 255, 0.055);
            --bg-panel-strong: rgba(18, 22, 29, 0.88);
            --border-soft: rgba(255, 255, 255, 0.1);
            --text-muted: #98a2b3;
            --accent-cyan: #4fc3ff;
            --accent-cyan-soft: #b8e8ff;
            --accent-blue: #0a84ff;
            --success: #30d158;
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 24%),
                radial-gradient(circle at 50% -10%, rgba(79, 195, 255, 0.08), transparent 28%),
                linear-gradient(180deg, #11151c 0%, #0d1117 40%, #090c11 100%);
            color: #f8fafc;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-honeycomb {
            background:
                radial-gradient(circle at 15% 0%, rgba(255, 255, 255, 0.06), transparent 22%),
                radial-gradient(circle at 85% 10%, rgba(79, 195, 255, 0.06), transparent 18%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
                linear-gradient(180deg, #11151c 0%, #0d1117 40%, #090c11 100%);
        }

        .text-cyan-gradient {
            background: linear-gradient(180deg, #ffffff 0%, #eef7ff 48%, #9ddcff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .font-auto { font-family: 'Orbitron', sans-serif; }

        .glass-panel {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.085), rgba(255, 255, 255, 0.035));
            background-color: var(--bg-panel);
            border: 1px solid var(--border-soft);
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(22px);
        }

        .soft-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.035));
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 20px 38px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(22px);
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .primary-button {
            background: linear-gradient(180deg, #5ac8fa 0%, #34aadc 100%);
            box-shadow:
                0 16px 30px rgba(52, 170, 220, 0.26),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
        }

        .mode-pill {
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .mode-pill.is-active {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.12));
            color: #ffffff;
            box-shadow:
                0 10px 22px rgba(0, 0, 0, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(148, 163, 184, 0.18);
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: white;
            border: 3px solid var(--accent-cyan);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 5px rgba(41, 184, 255, 0.16);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
        }

        .field-error {
            border-color: rgba(248, 113, 113, 0.85) !important;
            box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.08);
        }

        .input-shell {
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid rgba(255, 255, 255, 0.09);
        }

        .input-shell:focus-within {
            border-color: rgba(184, 232, 255, 0.36);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04);
        }

        .subtle-label {
            color: var(--text-muted);
            letter-spacing: 0.08em;
        }

        .uppercase-force {
            text-transform: uppercase;
        }

        @media (max-width: 420px) {
            .mobile-grid {
                grid-template-columns: 1fr;
            }

            .mobile-stack {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="bg-honeycomb min-h-screen flex flex-col">

    <div class="max-w-md mx-auto w-full flex flex-col min-h-screen p-3 sm:p-4">
        
        <!-- HEADER -->
        <header class="text-center mb-4 shrink-0">
            <p class="text-[8px] font-black tracking-[0.45em] text-slate-500 mb-1">FABIANO</p>
            <h1 class="text-[1.4rem] font-black italic font-auto text-cyan-gradient tracking-tight leading-none mb-3">AUTO REPASSE</h1>
            
            <div class="glass-panel rounded-[1.4rem] p-4 space-y-3">
                <input type="text" id="carModel" placeholder="MARCA / MODELO DO VEÍCULO" 
                    class="uppercase-force w-full bg-transparent border-b border-white/10 text-slate-50 placeholder:text-slate-500 text-sm font-black outline-none pb-2 text-center uppercase">
                
                <div class="grid grid-cols-2 gap-2 mobile-stack">
                    <input type="text" id="carYear" placeholder="Ano" class="uppercase-force input-shell rounded-xl py-2.5 text-xs text-white text-center outline-none">
                    <input type="text" id="carColor" placeholder="Cor" class="uppercase-force input-shell rounded-xl py-2.5 text-xs text-white text-center outline-none">
                    <input type="text" id="carPlate" placeholder="Placa" class="uppercase-force input-shell rounded-xl py-2.5 text-xs text-white text-center uppercase outline-none">
                    <input type="text" id="carOrigin" placeholder="Origem" class="uppercase-force input-shell rounded-xl py-2.5 text-xs text-white text-center outline-none">
                </div>

                <div class="flex items-center gap-3 px-1 pt-1">
                    <input type="range" id="quality" min="1" max="5" value="3" class="flex-1 cursor-pointer">
                    <span id="qualityLabel" class="text-[9px] font-black text-slate-950 px-2.5 py-1.5 rounded-full min-w-[58px] text-center bg-yellow-500">NOTA 3</span>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main class="space-y-4 flex-1">
            <!-- MODOS -->
            <div class="mode-pill p-1 rounded-2xl flex shadow-lg">
                <button id="modeSale" class="mode-pill flex-1 py-2.5 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all is-active">Tenho o Preço</button>
                <button id="modeProfit" class="mode-pill flex-1 py-2.5 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all text-slate-400">Quero o Lucro</button>
            </div>

            <!-- INPUTS FINANCEIROS -->
            <div class="glass-panel rounded-[1.5rem] p-4 space-y-4">
                <div class="grid grid-cols-2 gap-x-4 gap-y-4 mobile-grid">
                    <div class="space-y-1">
                        <label class="subtle-label text-[10px] font-black uppercase">Preço Compra</label>
                        <div class="input-shell relative rounded-xl">
                            <input type="text" id="carPrice" inputmode="numeric" autocomplete="off" class="w-full bg-transparent rounded-xl py-2.5 px-3 text-sm font-bold text-white outline-none">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="subtle-label text-[10px] font-black uppercase">Gastos Extras</label>
                        <div class="input-shell relative rounded-xl">
                            <input type="text" id="freight" inputmode="numeric" autocomplete="off" class="w-full bg-transparent rounded-xl py-2.5 px-3 text-sm font-bold text-white outline-none">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2 mobile-stack col-span-2">
                        <div class="space-y-1">
                            <label class="subtle-label text-[10px] font-black uppercase block mb-1">Dias de Pátio</label>
                            <input type="number" id="patioDays" min="0" value="15" class="input-shell w-full rounded-xl py-2.5 px-3 text-sm font-bold text-white outline-none text-center">
                        </div>
                        <div class="space-y-1">
                            <label class="subtle-label text-[10px] font-black uppercase block mb-1">Capital % a.m.</label>
                            <input type="number" id="oppRate" value="1.0" class="input-shell w-full rounded-xl py-2.5 px-3 text-sm font-bold text-white outline-none text-center">
                        </div>
                        <div class="space-y-1">
                            <label class="subtle-label text-[10px] font-black uppercase block mb-1">Imposto %</label>
                            <input type="number" id="taxRate" value="15.0" class="input-shell w-full rounded-xl py-2.5 px-3 text-sm font-bold text-white outline-none text-center">
                        </div>
                    </div>
                </div>

                <div class="pt-3 border-t border-white/8">
                    <label id="targetLabel" class="text-[10px] font-black uppercase tracking-wide text-sky-200 mb-1.5 block">Preço de Venda Pretendido</label>
                    <div class="relative rounded-[1rem] border border-white/10 bg-white/6 shadow-[inset_0_1px_0_rgba(255,255,255,0.06)]">
                        <input type="text" id="targetValue" inputmode="numeric" autocomplete="off" class="w-full bg-transparent rounded-[1rem] py-3 px-3 text-base font-black text-slate-50 outline-none">
                    </div>
                </div>

                <div id="statusPanel" class="hidden rounded-xl border p-3 text-sm leading-relaxed"></div>
            </div>

            <!-- RESULTADOS -->
            <div id="resultCard" class="soft-card rounded-[1.6rem] p-5 relative overflow-hidden">
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(255,255,255,0.09),transparent_26%)] pointer-events-none"></div>
                <div class="flex justify-between items-start gap-3 mb-3">
                    <div class="relative z-10">
                        <p id="resultHeadlineLabel" class="text-[10px] font-black text-sky-200 uppercase tracking-[0.12em] mb-1">Lucro Estimado</p>
                        <h2 id="resultHeadlineValue" class="text-[2rem] font-black text-white leading-none tracking-tight">R$ 0,00</h2>
                        <p id="resultSupportText" class="text-[11px] text-slate-400 font-semibold mt-2 hidden"></p>
                    </div>
                    <div class="text-right relative z-10">
                        <p class="text-[10px] font-black text-slate-500 uppercase mb-1">ROI</p>
                        <p id="resROI" class="text-[1.7rem] font-black leading-none text-sky-200">0,00%</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 pt-4 border-t border-white/8 relative z-10">
                    <div class="metric-card p-3 rounded-2xl text-center">
                        <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Preço Compra</p>
                        <p id="resCarPrice" class="text-xs text-slate-300 font-black">R$ 0,00</p>
                    </div>
                    <div class="metric-card p-3 rounded-2xl text-center">
                        <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Gastos Extras</p>
                        <p id="resFreight" class="text-xs text-slate-300 font-black">R$ 0,00</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 pt-2 relative z-10">
                    <div class="metric-card p-3 rounded-2xl text-center">
                        <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Custo Capital</p>
                        <p id="resOppCost" class="text-xs text-slate-300 font-black">R$ 0,00</p>
                    </div>
                    <div class="metric-card p-3 rounded-2xl text-center">
                        <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Imposto</p>
                        <p id="resTaxAmount" class="text-xs text-slate-300 font-black">R$ 0,00</p>
                    </div>
                </div>
                <div class="pt-2 relative z-10">
                    <div class="rounded-[1.15rem] border border-sky-300/12 bg-white/7 px-4 py-3 text-center shadow-[inset_0_1px_0_rgba(255,255,255,0.06)]">
                        <p class="text-[9px] font-bold text-sky-200 uppercase tracking-[0.12em] mb-1">Custo Total</p>
                        <p id="resTotalCost" class="text-[1.1rem] text-white font-black leading-none">R$ 0,00</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="mt-auto pt-4 shrink-0 pb-2">
            <button onclick="copyFullReport()" class="primary-button w-full text-white font-black text-[11px] uppercase tracking-[0.16em] py-4 rounded-2xl flex items-center justify-center gap-2 active:scale-[0.98] transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                COPIAR RELATÓRIO COMPLETO
            </button>
            <p class="text-center text-[9px] text-slate-600 mt-3 font-black tracking-[0.18em] uppercase">Fabiano Auto Repasse • Standalone v2.0</p>
        </footer>
    </div>

    <script>
        let currentMode = 'SALE'; // 'SALE' ou 'PROFIT'

        const inputs = [
            'carModel', 'carYear', 'carColor', 'carPlate', 'carOrigin', 'quality',
            'carPrice', 'freight', 'patioDays', 'oppRate', 'taxRate', 'targetValue'
        ];

        function formatBRL(val) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);
        }

        function formatCurrencyInputFromDigits(digits) {
            const cents = Number(digits || '0');
            return formatBRL(cents / 100);
        }

        function getCurrencyValue(id) {
            const input = document.getElementById(id);
            return Number(input.dataset.cents || '0') / 100;
        }

        function setCurrencyValue(id, value) {
            const input = document.getElementById(id);
            const cents = Math.max(0, Math.round((value || 0) * 100));
            input.dataset.cents = String(cents);
            input.value = cents === 0 ? '' : formatCurrencyInputFromDigits(String(cents));
        }

        function attachCurrencyMask(id) {
            const input = document.getElementById(id);

            input.addEventListener('input', () => {
                const digits = input.value.replace(/\D/g, '');
                input.dataset.cents = digits || '0';
                input.value = digits ? formatCurrencyInputFromDigits(digits) : '';
                calculate();
            });

            input.addEventListener('blur', () => {
                const digits = input.dataset.cents || '0';
                input.value = digits === '0' ? '' : formatCurrencyInputFromDigits(digits);
            });
        }

        const fieldIds = ['carPrice', 'freight', 'patioDays', 'oppRate', 'taxRate', 'targetValue'];

        function resetFieldErrors() {
            fieldIds.forEach((id) => {
                const element = document.getElementById(id);
                element.classList.remove('field-error');
                if (element.parentElement && element.parentElement.classList.contains('input-shell')) {
                    element.parentElement.classList.remove('field-error');
                }
            });
        }

        function setFieldError(id) {
            const element = document.getElementById(id);
            if (element.parentElement && element.parentElement.classList.contains('input-shell')) {
                element.parentElement.classList.add('field-error');
                return;
            }
            element.classList.add('field-error');
        }

        function renderStatus(type, lines) {
            const panel = document.getElementById('statusPanel');
            if (!lines.length) {
                panel.className = 'hidden rounded-xl border p-3 text-sm leading-relaxed';
                panel.innerHTML = '';
                return;
            }

            const styles = {
                error: 'rounded-xl border border-red-500/40 bg-red-500/10 text-red-200 p-3 text-sm leading-relaxed',
                warning: 'rounded-xl border border-amber-500/40 bg-amber-500/10 text-amber-100 p-3 text-sm leading-relaxed',
                success: 'rounded-xl border border-emerald-500/40 bg-emerald-500/10 text-emerald-100 p-3 text-sm leading-relaxed'
            };

            panel.className = styles[type];
            panel.innerHTML = lines.map((line) => `<div>${line}</div>`).join('');
        }

        function updateResultHeadline(mode, salePrice, netProfit) {
            const labelEl = document.getElementById('resultHeadlineLabel');
            const valueEl = document.getElementById('resultHeadlineValue');
            const supportEl = document.getElementById('resultSupportText');

            if (mode === 'PROFIT') {
                labelEl.innerText = 'Preço de Venda Necessário';
                valueEl.innerText = formatBRL(salePrice);
                supportEl.innerText = `Lucro líquido alvo: ${formatBRL(netProfit)}`;
                supportEl.classList.remove('hidden');
                return;
            }

            labelEl.innerText = 'Lucro Estimado';
            valueEl.innerText = formatBRL(netProfit);
            supportEl.innerText = `Venda considerada: ${formatBRL(salePrice)}`;
            supportEl.classList.remove('hidden');
        }

        function calculate() {
            const data = {};
            resetFieldErrors();
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (['carPrice', 'freight', 'targetValue'].includes(id)) {
                    data[id] = getCurrencyValue(id);
                } else {
                    data[id] = el.type === 'number' || el.type === 'range' ? parseFloat(el.value) || 0 : el.value;
                }
            });

            const errors = [];
            const warnings = [];

            if (data.carPrice <= 0) {
                errors.push('Informe um valor de compra maior que zero.');
                setFieldError('carPrice');
            }

            if (data.freight < 0) {
                errors.push('Gastos extras não podem ser negativos.');
                setFieldError('freight');
            }

            if (data.patioDays < 0) {
                errors.push('Os dias de pátio não podem ser negativos.');
                setFieldError('patioDays');
            }

            if (data.oppRate < 0 || data.oppRate > 15) {
                warnings.push('Revise a taxa de capital mensal. Valores fora da faixa usual podem distorcer o cálculo.');
                setFieldError('oppRate');
            }

            if (data.taxRate < 0 || data.taxRate >= 100) {
                errors.push('O imposto sobre lucro deve ficar entre 0% e 99,99%.');
                setFieldError('taxRate');
            }

            if (data.targetValue <= 0) {
                errors.push(currentMode === 'SALE'
                    ? 'Informe o preço de venda pretendido.'
                    : 'Informe o lucro líquido desejado.'
                );
                setFieldError('targetValue');
            }

            const days = Math.max(0, Math.round(data.patioDays || 0));

            // Custo de oportunidade (Capital)
            const annualRate = data.oppRate * 12;
            const dailyRate = (annualRate / 100) / 365;
            const taxableBase = data.carPrice + data.freight;
            const oppCost = taxableBase * dailyRate * days;
            const preTaxCost = taxableBase + oppCost;

            let salePrice, netProfit, roi, taxAmount = 0, totalCost = preTaxCost;

            if (!errors.length && currentMode === 'SALE') {
                salePrice = data.targetValue;
                const taxableProfit = salePrice - taxableBase;
                taxAmount = taxableProfit > 0 ? taxableProfit * (data.taxRate / 100) : 0;
                netProfit = salePrice - taxableBase - oppCost - taxAmount;
            } else if (!errors.length) {
                netProfit = data.targetValue;
                const factor = 1 - (data.taxRate / 100);
                const taxableProfit = factor > 0 ? (netProfit + oppCost) / factor : (netProfit + oppCost);
                salePrice = taxableBase + taxableProfit;
                taxAmount = taxableProfit > 0 ? taxableProfit * (data.taxRate / 100) : 0;
            }

            totalCost = preTaxCost + taxAmount;
            roi = totalCost > 0 ? (netProfit / totalCost) * 100 : 0;

            if (!errors.length && salePrice < totalCost) {
                warnings.push('O preço informado está abaixo do custo total. Esse cenário gera prejuízo.');
            }

            if (!errors.length && netProfit <= 0) {
                warnings.push('O lucro líquido ficou zerado ou negativo. Vale revisar preço, prazo e custos.');
            }

            if (!errors.length && roi > 0 && roi < 5) {
                warnings.push('O ROI ficou abaixo de 5%. Pode ser uma operação com retorno apertado.');
            }

            if (errors.length) {
                renderStatus('error', errors);
                updateResultHeadline(currentMode, 0, 0);
                document.getElementById('resROI').innerText = '0,00%';
                document.getElementById('resCarPrice').innerText = 'R$ 0,00';
                document.getElementById('resFreight').innerText = 'R$ 0,00';
                document.getElementById('resTotalCost').innerText = 'R$ 0,00';
                document.getElementById('resOppCost').innerText = 'R$ 0,00';
                document.getElementById('resTaxAmount').innerText = 'R$ 0,00';
                return;
            }

            // Atualizar UI
            updateResultHeadline(currentMode, salePrice, netProfit);
            document.getElementById('resROI').innerText = roi.toFixed(2).replace('.', ',') + '%';
            document.getElementById('resCarPrice').innerText = formatBRL(data.carPrice);
            document.getElementById('resFreight').innerText = formatBRL(data.freight);
            document.getElementById('resTotalCost').innerText = formatBRL(totalCost);
            document.getElementById('resOppCost').innerText = formatBRL(oppCost);
            document.getElementById('resTaxAmount').innerText = formatBRL(taxAmount);

            // Cores ROI
            const roiEl = document.getElementById('resROI');
            roiEl.className = `text-xl font-black leading-none ${roi >= 10 ? 'text-emerald-400' : 'text-cyan-400'}`;

            if (warnings.length) {
                renderStatus('warning', warnings);
            } else {
                renderStatus('success', ['Cálculo válido. Os números já consideram dias de pátio, custo do capital, gastos extras e imposto sobre o lucro.']);
            }

            // Salvar para o relatório
            window.lastCalc = { ...data, days, netProfit, salePrice, roi, totalCost, oppCost, taxAmount };
        }

        function updateQuality() {
            const val = document.getElementById('quality').value;
            const label = document.getElementById('qualityLabel');
            const hues = [0, 25, 45, 80, 130];
            const color = `hsl(${hues[val - 1]}, 85%, 50%)`;
            label.innerText = `NOTA ${val}`;
            label.style.backgroundColor = color;
            calculate();
        }

        function setMode(mode) {
            currentMode = mode;
            const btnSale = document.getElementById('modeSale');
            const btnProfit = document.getElementById('modeProfit');
            const label = document.getElementById('targetLabel');

            if (mode === 'SALE') {
                btnSale.className = "mode-pill is-active flex-1 py-2.5 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all";
                btnProfit.className = "mode-pill flex-1 py-2.5 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all text-slate-400";
                label.innerText = "Preço de Venda Pretendido";
            } else {
                btnProfit.className = "mode-pill is-active flex-1 py-2.5 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all";
                btnSale.className = "mode-pill flex-1 py-2.5 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all text-slate-400";
                label.innerText = "Lucro Líquido Almejado";
            }
            calculate();
        }

        function copyFullReport() {
            const c = window.lastCalc;
            if (!c) {
                alert("Preencha os campos obrigatórios antes de copiar o relatório.");
                return;
            }
            const text = `
💎 *FABIANO AUTO REPASSE*
---------------------------
🚗 *VEÍCULO:* ${c.carModel || 'NÃO INFORMADO'}
📅 *ANO:* ${c.carYear || '-'}
🎨 *COR:* ${c.carColor || '-'}
🔤 *PLACA:* ${c.carPlate || '-'}
📍 *ORIGEM:* ${c.carOrigin || '-'}
⭐ *NOTA:* ${c.quality}/5
---------------------------
💰 *PREÇO COMPRA:* ${formatBRL(c.carPrice)}
📦 *GASTOS EXTRAS:* ${formatBRL(c.freight)}
🏦 *CUSTO CAPITAL:* ${formatBRL(c.oppCost || 0)}
🧾 *IMPOSTO:* ${formatBRL(c.taxAmount || 0)}
🧮 *CUSTO TOTAL:* ${formatBRL(c.totalCost || 0)}
📈 *TAXA CAPITAL:* ${c.oppRate}% a.m.
💸 *IMP. LUCRO:* ${c.taxRate}%
📅 *DIAS PÁTIO:* ${c.days}
---------------------------
🏷️ *VENDA:* ${formatBRL(c.salePrice)}
💰 *LUCRO LÍQ.:* ${formatBRL(c.netProfit)}
🚀 *ROI:* ${c.roi.toFixed(2).replace('.', ',')}%
---------------------------
_Gerado por Fabiano Auto Repasse_
            `.trim();

            navigator.clipboard.writeText(text).then(() => {
                alert("Relatório completo copiado!");
            });
        }

        // Event Listeners
        inputs.forEach(id => {
            if (['carPrice', 'freight', 'targetValue'].includes(id)) {
                return;
            }
            document.getElementById(id).addEventListener('input', id === 'quality' ? updateQuality : calculate);
        });

        ['carModel', 'carYear', 'carColor', 'carPlate', 'carOrigin'].forEach((id) => {
            document.getElementById(id).addEventListener('input', (event) => {
                event.target.value = event.target.value.toUpperCase();
            });
        });

        attachCurrencyMask('carPrice');
        attachCurrencyMask('freight');
        attachCurrencyMask('targetValue');

        setCurrencyValue('carPrice', 0);
        setCurrencyValue('freight', 0);
        setCurrencyValue('targetValue', 0);

        document.getElementById('modeSale').addEventListener('click', () => setMode('SALE'));
        document.getElementById('modeProfit').addEventListener('click', () => setMode('PROFIT'));

        // Init
        updateQuality();
    </script>
</body>
</html>
